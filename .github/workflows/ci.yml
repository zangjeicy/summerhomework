name: CI

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔎 Change Detection
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      desktop: ${{ steps.filter.outputs.desktop }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🧭 Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/dsa-web/**'
              - 'api/**'
              - 'src/auth.py'
              - 'main.py'
            desktop:
              - 'apps/dsa-desktop/**'
              - 'scripts/build-desktop*.ps1'
              - 'scripts/build-backend.ps1'
              - 'product-release.json'
              - '.env.example'
            docker:
              - 'docker/**'
              - 'api/**'
              - 'src/**'
              - 'main.py'
              - 'requirements.txt'
              - 'apps/dsa-web/**'
              - '.env.example'
  ai-governance:
    name: ai-governance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: 🤖 Check AI governance assets
        run: python scripts/check_ai_assets.py

  backend-gate:
    name: backend-gate
    runs-on: ubuntu-latest
    needs: [ai-governance]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            .github/requirements-ci.txt
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            if python -m pip install -r .github/requirements-ci.txt; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Dependency install failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Dependency install attempt ${attempt} failed, retrying in 15s..." >&2
            sleep 15
          done
      - name: ✅ Python syntax check
        run: ./scripts/ci_gate.sh syntax
      - name: ✅ Flake8 critical checks
        run: ./scripts/ci_gate.sh flake8
      - name: ✅ Local deterministic checks
        run: ./scripts/ci_gate.sh deterministic
      - name: ✅ Offline test suite
        run: ./scripts/ci_gate.sh offline-tests

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [changes, ai-governance]
    if: needs.changes.outputs.docker == 'true'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 🐳 Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: stock-analysis:test
          load: true
          cache-from: type=gha,scope=stock-analysis-ci-docker
          cache-to: type=gha,mode=max,scope=stock-analysis-ci-docker,ignore-error=true
      - name: 🐳 Start container and require readiness
        run: |
          docker run -d --name stock-analysis-ci -p 127.0.0.1:18000:8000 -e ALLOW_INSECURE_PUBLIC_BIND=true stock-analysis:test python main.py --serve-only --host 0.0.0.0 --port 8000
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:18000/api/ready; then exit 0; fi
            sleep 2
          done
          docker logs stock-analysis-ci
          exit 1
      - name: 🐳 Verify stopped service fails health probe
        run: |
          docker stop stock-analysis-ci
          if curl --fail --silent --max-time 3 http://127.0.0.1:18000/api/ready; then exit 1; fi
      - name: 🧾 Container diagnostics
        if: always()
        run: docker logs stock-analysis-ci 2>&1 || true
      - name: 🔍 Docker smoke imports
        run: |
          docker run --rm stock-analysis:test python -c "
          from src.config import get_config; print('✅ config')
          from src.storage import DatabaseManager; print('✅ storage')
          from src.notification import NotificationService; print('✅ notification')
          from data_provider import DataFetcherManager; print('✅ data_provider')
          from src.analyzer import GeminiAnalyzer; print('✅ analyzer')
          from src.patches.eastmoney_patch import eastmoney_patch; print('✅ patch')
          from bot.dispatcher import CommandDispatcher; print('✅ bot')
          from api.app import app; print('✅ api')
          print('✅ All Docker imports OK')
          "

  web-gate:
    name: web-gate
    runs-on: ubuntu-latest
    needs: [changes, ai-governance]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: apps/dsa-web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json
      - name: 📦 Install
        run: npm ci
      - name: 🔎 Lint
        run: npm run lint
      - name: 🧪 Unit tests
        run: npm test
      - name: 🏗️ Build
        run: npm run build
      - name: 🌐 Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: 🌐 Core happy path
        env:
          DSA_WEB_SMOKE_PASSWORD: ci-smoke-password
        run: |
          printf 'ADMIN_AUTH_ENABLED=true\n' > ../../.env
          npx playwright test e2e/smoke.spec.ts --project=chromium --grep "login page renders password form"

  desktop-gate:
    name: desktop-gate
    runs-on: windows-latest
    needs: [changes, ai-governance]
    if: needs.changes.outputs.desktop == 'true'
    defaults:
      run:
        working-directory: apps/dsa-desktop
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/dsa-desktop/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
      - name: Electron entry smoke
        run: node --check main.js
      - name: Windows unpacked build
        run: npx electron-builder --win dir --publish never
